name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,figures]'
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest
      - run: realm-eeg synthetic-demo --output ${{ runner.temp }}/realm-demo
      - run: python scripts/generate_figures.py
      - run: python -m pip wheel . --no-deps --wheel-dir ${{ runner.temp }}/dist
