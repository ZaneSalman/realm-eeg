 <title id="figure-01-realm-pipeline-title">REALM four-stage cross-patient seizure-detection pipeline</title>
 <desc id="figure-01-realm-pipeline-desc">Raw multi-patient EEG passes through population pretraining, adversarial patient disentanglement, few-shot MAML adaptation, and SHAP, attention, and feature-space interpretation before a clinical prediction and explanation are produced. The backbone is refined during Stages 1–3 and queried, rather than updated, in Stage 4.</desc>
